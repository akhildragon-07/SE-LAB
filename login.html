<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TravelSphere | Login & Signup</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="top-nav">
        <div class="brand">
          <div class="brand-logo"></div>
          <div class="brand-title">TravelSphere</div>
        </div>
        <nav class="nav-links">
          <a href="index.html">Home</a>
          <a href="scientist-dashboard.html">Analytics</a>
        </nav>
      </header>

      <main class="main-content">
        <div class="page" style="max-width: 900px">
          <div class="section-header" style="margin-top: 32px">
            <div>
              <h2 class="section-title">Access your TravelSphere portal</h2>
              <p class="section-subtitle">
                Log in as a traveler, agent, admin or NATPAC scientist.
              </p>
            </div>
          </div>

          <div class="grid-row" style="grid-template-columns: 1.2fr 1fr">
            <section class="card">
              <div class="card-header">
                <h2>Login</h2>
              </div>
              <form id="login-form">
                <div id="login-message" style="margin-bottom: 12px; padding: 10px; border-radius: 6px; display: none; font-size: 0.9rem;"></div>
                <div class="filter-group" style="margin-bottom: 12px">
                  <label>Email</label>
                  <input type="email" id="login-email" placeholder="you@example.com" />
                </div>
                <div class="filter-group" style="margin-bottom: 12px">
                  <label>Password</label>
                  <input type="password" id="login-password" placeholder="••••••••" />
                </div>
                <button type="button" id="login-btn" class="btn-primary" style="width: 100%">
                  Login
                </button>
              </form>
            </section>

            <section class="card">
              <div class="card-header">
                <h2>Sign up</h2>
              </div>
              <form id="signup-form">
                <div id="signup-message" style="margin-bottom: 12px; padding: 10px; border-radius: 6px; display: none; font-size: 0.9rem;"></div>
                <div class="filter-group" style="margin-bottom: 8px">
                  <label>Full name</label>
                  <input type="text" id="signup-name" placeholder="Your name" />
                </div>
                <div class="filter-group" style="margin-bottom: 8px">
                  <label>Email</label>
                  <input type="email" id="signup-email" placeholder="you@example.com" />
                </div>
                <div class="filter-group" style="margin-bottom: 8px">
                  <label>Create password</label>
                  <input type="password" id="signup-password" placeholder="••••••••" />
                </div>
                <div class="filter-group" style="margin-bottom: 12px">
                  <label>Role</label>
                  <select id="signup-role">
                    <option value="Traveler">Traveler</option>
                    <option value="Travel Agent">Travel Agent</option>
                    <option value="Admin">Admin</option>
                    <option value="NATPAC Scientist">NATPAC Scientist</option>
                  </select>
                </div>
                <button type="button" id="signup-btn" class="btn-secondary" style="width: 100%">
                  Create account
                </button>
              </form>
            </section>
          </div>
        </div>
      </main>
    </div>

    <!-- Backend Integration Script -->
    <script>
      document.getElementById('login-btn').addEventListener('click', async () => {
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;
        const messageBox = document.getElementById('login-message');
        const btn = document.getElementById('login-btn');
        
        btn.innerText = "Processing...";
        btn.disabled = true;

        try {
          const response = await fetch('http://localhost:3000/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });
          const result = await response.json();
          messageBox.style.display = 'block';

          if (response.ok) {
            messageBox.style.backgroundColor = '#ecfdf5';
            messageBox.style.color = '#059669';
            messageBox.style.border = '1px solid #a7f3d0';
            messageBox.innerHTML = `✅ Login successful! Redirecting...`;
            
            // Save user to local storage to simulate session persistence
            localStorage.setItem('travelsphere_user', JSON.stringify(result.user));

            // Redirect based on Role
            setTimeout(() => {
                if (result.user.role === 'Traveler') window.location.href = 'traveler-dashboard.html';
                else if (result.user.role === 'Travel Agent') window.location.href = 'agent-dashboard.html';
                else if (result.user.role === 'NATPAC Scientist') window.location.href = 'scientist-dashboard.html';
                else window.location.href = 'index.html'; // Admin fallback
            }, 1000);
          } else {
            messageBox.style.backgroundColor = '#fef2f2';
            messageBox.style.color = '#dc2626';
            messageBox.style.border = '1px solid #fecaca';
            messageBox.innerHTML = `❌ ${result.message}`;
          }
        } catch (error) {
          messageBox.style.display = 'block';
          messageBox.style.backgroundColor = '#fef2f2';
          messageBox.style.color = '#dc2626';
          messageBox.style.border = '1px solid #fecaca';
          messageBox.innerHTML = `❌ <strong>Server Offline:</strong> Cannot connect to backend. Please ensure Node.js is running.`;
        }

        btn.innerText = "Login";
        btn.disabled = false;
      });

      document.getElementById('signup-btn').addEventListener('click', async () => {
        const name = document.getElementById('signup-name').value;
        const email = document.getElementById('signup-email').value;
        const password = document.getElementById('signup-password').value;
        const role = document.getElementById('signup-role').value;
        
        const messageBox = document.getElementById('signup-message');
        const btn = document.getElementById('signup-btn');
        
        btn.innerText = "Processing...";
        btn.disabled = true;

        try {
          // Sending data to our Node.js Backend Server
          const response = await fetch('http://localhost:3000/api/signup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email, password, role })
          });

          const result = await response.json();
          messageBox.style.display = 'block';

          if (response.ok) {
            // Positive Test Result
            messageBox.style.backgroundColor = '#ecfdf5';
            messageBox.style.color = '#059669';
            messageBox.style.border = '1px solid #a7f3d0';
            messageBox.innerHTML = `✅ ${result.message}`;
            document.getElementById('signup-form').reset();
          } else {
            // Negative Test Result (Constraint failed)
            messageBox.style.backgroundColor = '#fef2f2';
            messageBox.style.color = '#dc2626';
            messageBox.style.border = '1px solid #fecaca';
            messageBox.innerHTML = `❌ <strong>Please fix the following errors:</strong><ul style="margin: 5px 0 0 15px; padding: 0;">` + 
              result.errors.map(err => `<li>${err}</li>`).join('') + 
              `</ul>`;
          }
        } catch (error) {
          messageBox.style.display = 'block';
          messageBox.style.backgroundColor = '#fef2f2';
          messageBox.style.color = '#dc2626';
          messageBox.style.border = '1px solid #fecaca';
          messageBox.innerHTML = `❌ <strong>Server Offline:</strong> Cannot connect to backend. Please ensure Node.js is running.`;
        }

        btn.innerText = "Create account";
        btn.disabled = false;
      });
    </script>
  </body>
</html>

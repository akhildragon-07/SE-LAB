<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TravelSphere | Basic Packages</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="top-nav">
        <div class="brand">
          <div class="brand-logo"></div>
          <div class="brand-title">TravelSphere</div>
        </div>
        <nav class="nav-links">
          <a href="traveler-dashboard.html">Dashboard</a>
        </nav>
      </header>

      <main class="main-content">
        <div class="page">
          <div class="section-header" style="margin-top: 24px">
            <div>
              <h2 class="section-title">Browse basic packages</h2>
              <p class="section-subtitle">
                Ready-made itineraries with fixed inclusions and transparent pricing.
              </p>
            </div>
          </div>

          <section class="filter-bar">
            <div class="filter-group">
              <label>Destination</label>
              <select>
                <option>All</option>
                <option>Goa</option>
                <option>Munnar</option>
                <option>Kashmir</option>
              </select>
            </div>
            <div class="filter-group">
              <label>Budget</label>
              <select>
                <option>Any</option>
                <option>₹10k – ₹25k</option>
                <option>₹25k – ₹50k</option>
                <option>₹50k+</option>
              </select>
            </div>
            <div class="filter-group">
              <label>Duration</label>
              <select>
                <option>Any</option>
                <option>1–3 days</option>
                <option>4–7 days</option>
                <option>7+ days</option>
              </select>
            </div>
          </section>

          <div class="card-grid" id="packages-container" style="margin-top: 16px">
            <p>Loading packages...</p>
          </div>
        </div>
      </main>
    </div>

    <script>
      async function loadPackages() {
        try {
          const res = await fetch('http://localhost:3000/api/packages');
          const packages = await res.json();
          const container = document.getElementById('packages-container');
          
          if (!packages || packages.length === 0) {
              container.innerHTML = "<p>No packages found.</p>";
              return;
          }

          container.innerHTML = packages.map(pkg => `
            <article class="role-card" style="display: flex; flex-direction: column;">
              <img src="${pkg.image}" alt="${pkg.title}" style="width: 100%; border-radius: 12px; margin-bottom: 8px" />
              <h3>${pkg.title}</h3>
              <p>${pkg.description}</p>
              <p><strong>From ₹${pkg.price.toLocaleString()}</strong> · ${pkg.type}</p>
              <button class="btn-primary" style="margin-top: auto; width: 100%; border-radius: 99px;" onclick="bookPackage(${pkg.id})">Book Now</button>
            </article>
          `).join('');
        } catch (e) {
          document.getElementById('packages-container').innerHTML = "<p>Error loading packages.</p>";
        }
      }

      async function bookPackage(id) {
        const user = JSON.parse(localStorage.getItem('travelsphere_user'));
        if (!user) {
            alert("Please log in first!");
            window.location.href = "login.html";
            return;
        }
        
        try {
          const res = await fetch('http://localhost:3000/api/book', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ packageId: id, userEmail: user.email })
          });
          const result = await res.json();
          if (res.ok) alert(result.message);
          else alert(result.message || "Failed to book");
        } catch(e) {
          alert("Server error. Please ensure the backend is running.");
        }
      }

      loadPackages();
    </script>
  </body>
</html>
